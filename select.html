<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <script>
        (function () {
            const auth = JSON.parse(localStorage.getItem("urban_auth") || "null");
            if (!auth || !auth.session_token) {
                window.location.href = "login.html";
            }
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Portal - Seleção de Servidor</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: #0d1117;
            background-image: radial-gradient(circle at 20% 30%, rgba(168, 85, 247, 0.15) 0%, transparent 40%),
                              radial-gradient(circle at 80% 70%, rgba(0, 255, 153, 0.1) 0%, transparent 40%);
            color: #c9d1d9;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }

        .header-title {
            text-align: center;
            margin-bottom: 50px;
        }

        .header-title h1 {
            font-size: 3em;
            font-weight: 800;
            color: white;
            letter-spacing: 1px;
            text-shadow: 0 0 20px rgba(168, 85, 247, 0.5);
        }

        .header-title span {
            color: #00ff99;
        }
        
        .header-title p {
            font-size: 1.2em;
            color: #8b949e;
            margin-top: 10px;
        }

        .selection-container {
            display: flex;
            gap: 40px;
            max-width: 900px;
            width: 100%;
            justify-content: center;
            flex-wrap: wrap;
        }

        .game-card {
            background: rgba(22, 27, 34, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            flex: 1;
            min-width: 300px;
            max-width: 400px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
            color: white;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .game-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: all 0.6s;
        }

        .game-card:hover::before {
            left: 100%;
        }

        .game-card.ut:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: rgba(168, 85, 247, 0.6);
            box-shadow: 0 20px 40px rgba(168, 85, 247, 0.2);
        }
        
        .game-card.ut i {
            color: #a855f7;
            text-shadow: 0 0 20px rgba(168, 85, 247, 0.6);
        }

        .game-card.cs:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: rgba(0, 255, 153, 0.6);
            box-shadow: 0 20px 40px rgba(0, 255, 153, 0.2);
        }

        .game-card.cs i {
            color: #00ff99;
            text-shadow: 0 0 20px rgba(0, 255, 153, 0.6);
        }

        .game-card i {
            font-size: 5em;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .game-card h2 {
            font-size: 2em;
            margin-bottom: 15px;
            font-weight: 800;
        }

        .game-card p {
            color: #8b949e;
            font-size: 1.1em;
            line-height: 1.5;
        }

        .logout-btn {
            position: absolute;
            top: 30px;
            right: 40px;
            background: rgba(22, 27, 34, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #c9d1d9;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: rgba(255, 85, 85, 0.2);
            border-color: rgba(255, 85, 85, 0.5);
            color: #ff5555;
        }

    </style>
</head>
<body>

    <button class="logout-btn" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i> Sair</button>

    <div class="header-title">
        <h1>Game<span>Portal</span></h1>
        <p>Selecione o painel do servidor que deseja acessar</p>
    </div>

    <div class="selection-container">
        <!-- Card Urban Terror -->
        <a href="index.html" class="game-card ut">
            <i class="fas fa-crosshairs"></i>
            <h2>Urban Terror</h2>
            <p>Estatísticas em tempo real, votação de mapas e controle completo do servidor 4.3.</p>
        </a>

        <!-- Card Counter-Strike -->
        <a href="cs.html" class="game-card cs">
            <i class="fas fa-bomb"></i>
            <h2>Counter-Strike: Source</h2>
            <p>Gerenciamento do servidor, modo competitivo WarMod e inicialização.</p>
        </a>
    </div>

    <script>
        function handleLogout() {
            localStorage.removeItem("urban_auth");
            window.location.href = "login.html";
        }
    </script>
</body>
</html>
