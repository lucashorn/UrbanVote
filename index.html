<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <script>
        (function () {
            const auth = JSON.parse(localStorage.getItem("urban_auth") || "null");
            if (!auth || !auth.session_token) {
                window.location.href = "login.html";
            }
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terroismo Urbanor - Map vote inverso</title>
    <link rel="icon" href="img/ico.jpeg" type="image/jpeg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/2.0.8/css/dataTables.dataTables.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css">
    <link rel="stylesheet" href="style.css?v=17">
</head>

<body>

    <header style="position: relative;">
        <!-- Widget de Autenticação -->
        <div id="authWidget" class="auth-widget">
            <div id="authLoggedOut">
                <button onclick="openAuthModal()" class="auth-btn"><i class="fas fa-sign-in-alt"></i> Entrar / Registrar</button>
            </div>
            <div id="authLoggedIn" style="display: none; align-items: center; justify-content: center; gap: 12px;">
                <span class="auth-welcome">Olá, <strong id="loggedInUsername" style="color: #a855f7;"></strong></span>
                <span id="linkedPlayerBadge" class="linked-player-badge" style="display: none;"></span>
                <button onclick="openAccountMgmtModal()" class="auth-icon-btn" title="Gerenciar Conta"><i class="fas fa-user-cog"></i></button>
                <button onclick="handleLogout()" class="auth-icon-btn" title="Sair"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>

        <img src="img/logo.png" alt="Urban Terror" class="site-logo">
        
        <a href="select.html" class="nav-btn-ut">
            <i class="fas fa-arrow-left"></i> Voltar
        </a>

        <h1>Votação de Mapas</h1>

        <div id="dashboard">
            <div class="dashboard-stats">
                <div class="stat-row">
                    <label>Mapa mais votado:</label>
                    <span id="topMap">-</span>
                </div>
                <div class="stat-row">
                    <label>Modo mais votado:</label>
                    <span id="topMode">-</span>
                </div>
                <div class="stat-row">
                    <label>Total de votos:</label>
                    <span id="totalVotes">0</span>
                </div>
            </div>

            <div id="ranking"></div>

            <hr>

            <div class="dashboard-actions">
                <button id="downloadMapcycle"><i class="fas fa-download"></i> Mapcycle</button>
                <button id="resetVotesBtn"><i class="fas fa-rotate-left"></i> Resetar</button>
            </div>
        </div>
    </header>

    <div class="floating-tools">
        <button id="minigamesBtn" title="Minigames">
            <i class="fas fa-gamepad"></i>
        </button>
        <button id="myProfileBtn" title="Meu Perfil">
            <i class="fas fa-user-cog"></i>
        </button>
        <button id="adminBtn" title="Administração">
            <i class="fas fa-tools"></i>
        </button>
        <button id="historyBtn" title="Histórico">
            <i class="fas fa-history"></i>
        </button>
        <button id="killRankingBtn" title="Ranking">
            <i class="fas fa-trophy"></i>
        </button>
    </div>

    <!-- Modal Containers (Preenchido dinamicamente via JS Loader) -->
    <div id="modalsContainer"></div>

    <!-- Panel Containers (Preenchido dinamicamente via JS Loader) -->
    <div id="panelsContainer"></div>

    <!-- Main Content -->
    <main>
        <div class="map-grid" id="mapGrid"></div>
    </main>

    <!-- Quadro Flutuante do Top 3 Ranking Geral -->
    <div id="top3FloatingPanel" style="display: none;">
        <div id="top3List" class="top3-list">
            <!-- Renderizado via JS -->
        </div>
    </div>

    <!-- Bibliotecas Externas -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/2.0.8/js/dataTables.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    
    <!-- Loader Dinâmico do UrbanVote -->
    <script src="js/loader.js?v=17"></script>
</body>
</html>
