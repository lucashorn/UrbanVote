<!-- Modal de Recorte de Foto -->
<div id="cropModal" class="modal">
    <div class="modal-content profile-modal" style="max-width: 450px;">
        <span class="close" id="cropClose">&times;</span>
        <h2><i class="fas fa-crop-alt"></i> Ajustar Foto</h2>
        <p style="font-size: 0.9em; color: #aaa; margin-bottom: 15px;">
            Arraste e redimensione para enquadrar seu rosto no círculo.
        </p>
        <div style="margin: 15px 0; max-height: 300px; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; border-radius: 8px;">
            <img id="cropImage" style="max-width: 100%; max-height: 300px; display: block;">
        </div>

        <!-- Controles de zoom -->
        <div style="margin: 15px 0; display: flex; align-items: center; justify-content: center; gap: 10px;">
            <button id="zoomOutBtn" type="button" style="background: #333; border: 1px solid #444; color: white; border-radius: 50%; width: 36px; height: 36px; cursor: pointer; display: flex; align-items: center; justify-content: center;">
                <i class="fas fa-search-minus"></i>
            </button>
            <input type="range" id="zoomSlider" min="0" max="100" value="0" style="flex: 1; accent-color: #ffaa00; height: 6px; border-radius: 3px; cursor: pointer;">
            <button id="zoomInBtn" type="button" style="background: #333; border: 1px solid #444; color: white; border-radius: 50%; width: 36px; height: 36px; cursor: pointer; display: flex; align-items: center; justify-content: center;">
                <i class="fas fa-search-plus"></i>
            </button>
        </div>

        <button id="cropConfirmBtn" style="background: #00ff99; color: #000; font-weight: bold; width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; margin-top: 10px;">
            Confirmar Recorte
        </button>
    </div>
</div>
