<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UrbanVote - Autenticação</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- FontAwesome icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        // Redirecionamento instantâneo se já estiver logado
        (function() {
            const auth = JSON.parse(localStorage.getItem("urban_auth") || "null");
            if (auth && auth.session_token) {
                window.location.href = "index.html";
            }
        })();
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: #0d1117;
            background-image: radial-gradient(circle at 20% 30%, rgba(168, 85, 247, 0.15) 0%, transparent 40%),
                              radial-gradient(circle at 80% 70%, rgba(0, 255, 153, 0.1) 0%, transparent 40%);
            color: #c9d1d9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
            background: rgba(22, 27, 34, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 16px;
            padding: 40px 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5),
                        0 0 20px rgba(168, 85, 247, 0.1);
        }

        .brand {
            text-align: center;
            margin-bottom: 30px;
        }

        .brand i {
            font-size: 3em;
            color: #a855f7;
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(168, 85, 247, 0.5);
        }

        .brand h1 {
            font-size: 2em;
            font-weight: 800;
            color: white;
            letter-spacing: 1px;
        }

        .brand span {
            color: #00ff99;
        }

        .auth-tabs {
            display: flex;
            border-bottom: 2px solid #21262d;
            margin-bottom: 30px;
        }

        .auth-tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: #8b949e;
            padding: 12px;
            font-size: 1.05em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            text-align: center;
        }

        .auth-tab-btn:hover {
            color: white;
        }

        .auth-tab-btn.active {
            color: #a855f7;
        }

        .auth-tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 2px;
            background: #a855f7;
            box-shadow: 0 0 8px #a855f7;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #8b949e;
            transition: color 0.3s ease;
        }

        .form-control {
            width: 100%;
            padding: 14px 14px 14px 44px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            color: white;
            font-size: 0.95em;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: #a855f7;
            box-shadow: 0 0 10px rgba(168, 85, 247, 0.2);
        }

        .form-control:focus + i {
            color: #a855f7;
        }

        .auth-submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #a855f7 0%, #7c3aed 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3);
            margin-top: 10px;
        }

        .auth-submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(168, 85, 247, 0.5);
            filter: brightness(1.1);
        }

        .auth-submit-btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="brand">
            <i class="fas fa-crosshairs"></i>
            <h1>Urban<span>Vote</span></h1>
        </div>

        <div class="auth-tabs">
            <button id="tabLoginBtn" class="auth-tab-btn active" onclick="switchTab('login')">Entrar</button>
            <button id="tabRegisterBtn" class="auth-tab-btn" onclick="switchTab('register')">Criar Conta</button>
        </div>

        <!-- Form de Login -->
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <input type="text" id="loginUsername" class="form-control" placeholder="Usuário" required>
                <i class="fas fa-user"></i>
            </div>
            <div class="form-group">
                <input type="password" id="loginPassword" class="form-control" placeholder="Senha" required>
                <i class="fas fa-lock"></i>
            </div>
            <button type="submit" class="auth-submit-btn">ENTRAR</button>
        </form>

        <!-- Form de Cadastro -->
        <form id="registerForm" onsubmit="handleRegister(event)" style="display: none;">
            <div class="form-group">
                <input type="text" id="registerUsername" class="form-control" placeholder="Usuário" required>
                <i class="fas fa-user"></i>
            </div>
            <div class="form-group">
                <input type="password" id="registerPassword" class="form-control" placeholder="Senha" required>
                <i class="fas fa-lock"></i>
            </div>
            <div class="form-group">
                <input type="password" id="registerPasswordConfirm" class="form-control" placeholder="Confirme a Senha" required>
                <i class="fas fa-shield-halved"></i>
            </div>
            <button type="submit" class="auth-submit-btn">CRIAR CONTA</button>
        </form>
    </div>

    <script>
        const API_URL = window.location.origin.includes("localhost") || window.location.origin.includes("127.0.0.1") 
            ? "http://localhost:8085" 
            : window.location.origin;

        function switchTab(tab) {
            const loginF = document.getElementById("loginForm");
            const registerF = document.getElementById("registerForm");
            const tabLogin = document.getElementById("tabLoginBtn");
            const tabRegister = document.getElementById("tabRegisterBtn");

            if (tab === 'login') {
                loginF.style.display = "block";
                registerF.style.display = "none";
                tabLogin.classList.add("active");
                tabRegister.classList.remove("active");
            } else {
                loginF.style.display = "none";
                registerF.style.display = "block";
                tabLogin.classList.remove("active");
                tabRegister.classList.add("active");
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById("loginUsername").value.trim();
            const password = document.getElementById("loginPassword").value.trim();

            const savedProfile = JSON.parse(localStorage.getItem("urban_profile") || "null");
            const payload = { username, password };
            if (savedProfile && savedProfile.name && savedProfile.code) {
                payload.player_name = savedProfile.name;
                payload.auth_code = savedProfile.code;
            }

            try {
                const res = await fetch(`${API_URL}/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    const data = await res.json();
                    localStorage.setItem("urban_auth", JSON.stringify({
                        username: data.username,
                        player_name: data.player_name,
                        session_token: data.session_token,
                        aim_highscore: data.aim_highscore
                    }));

                    if (data.aim_highscore) {
                        const highScores = JSON.parse(localStorage.getItem("aim_trainer_highscores") || "{}");
                        highScores["30_gridshot"] = Math.max(highScores["30_gridshot"] || 0, data.aim_highscore);
                        localStorage.setItem("aim_trainer_highscores", JSON.stringify(highScores));
                    }

                    // Clear old session cookie/profile if successfully linked
                    if (data.player_name) {
                        localStorage.removeItem("urban_profile");
                    }

                    window.location.href = "index.html";
                } else {
                    alert(await res.text());
                }
            } catch (err) {
                alert("Erro ao se conectar ao servidor.");
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const username = document.getElementById("registerUsername").value.trim();
            const password = document.getElementById("registerPassword").value.trim();
            const confirm = document.getElementById("registerPasswordConfirm").value.trim();

            if (password !== confirm) {
                return alert("As senhas não coincidem.");
            }

            const savedProfile = JSON.parse(localStorage.getItem("urban_profile") || "null");
            const payload = { username, password };
            if (savedProfile && savedProfile.name && savedProfile.code) {
                payload.player_name = savedProfile.name;
                payload.auth_code = savedProfile.code;
            }

            try {
                const res = await fetch(`${API_URL}/register`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    const data = await res.json();
                    alert("Conta criada com sucesso! Agora você já pode entrar.");
                    
                    // If backend auto-linked the player profile
                    if (data.auto_linked) {
                        localStorage.removeItem("urban_profile");
                    }

                    switchTab("login");
                    document.getElementById("loginUsername").value = username;
                    document.getElementById("registerUsername").value = "";
                    document.getElementById("registerPassword").value = "";
                    document.getElementById("registerPasswordConfirm").value = "";
                } else {
                    alert(await res.text());
                }
            } catch (err) {
                alert("Erro ao se conectar ao servidor.");
            }
        }
    </script>
</body>
</html>
